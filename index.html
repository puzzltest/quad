<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>quad</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    <script src="https://cdn.jsdelivr.net/npm/zipson@latest/dist/zipson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/planck-js/0.2.7/planck.min.js" integrity="sha512-IVsLLQP/kMc0V83fUYMsOoGmRKVZqpxnSFOfbYZrtabeYpXZ8d5TXKAu7HAsseYTuB4wTqlobmShZ9hZChmvDw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://sfxr.me/riffwave.js"></script>
    <script src="https://sfxr.me/sfxr.js"></script>
  </head>
  <body>
    <canvas></canvas>
    <script type="module" src="/index.js"></script>
    <script>
      const host = window.location.hostname;
      if (host === "quad.surge.sh") {
        const save = encodeURIComponent(JSON.stringify(zipson.parse(localStorage.getItem("save"))));
        window.location.href = "https://qat.pages.dev/?save=" + save;
      } else if (host === "qat.pages.dev") {
        const params = new URLSearchParams(window.location.search);
        const save = params.get("save");
        if (save) {
          const new_raw = zipson.stringify(JSON.parse(decodeURIComponent(save)));
          localStorage.setItem("save", new_raw);
          setTimeout(() => window.location.href = "/", 100);
        }
      }
    </script>
  </body>
</html>
